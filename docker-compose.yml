services:

  nginx:
    image: nginx:alpine
    container_name: expense-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_data:/var/www/html
      - storage_data:/var/www/html/storage
    depends_on:
      - php
    networks:
      - expense-network
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: expense-php
    volumes:
      - app_data:/var/www/html
      - storage_data:/var/www/html/storage
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - expense-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: expense-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-expense_manager}
      MYSQL_USER: ${DB_USERNAME:-expense_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - expense-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: expense-queue
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - app_data:/var/www/html
      - storage_data:/var/www/html/storage
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - expense-network
    restart: unless-stopped

networks:
  expense-network:
    driver: bridge

volumes:
  mysql_data:
  storage_data:
  app_data:
